name: Deploy Provisões

on:
  push:
    branches: [main]
    paths:
      - "**.xlsx"
      - "index.html"
      - "scripts/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install openpyxl
        run: pip install openpyxl

      - name: Extract Excel data to JSON
        run: python scripts/extract_data.py

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: atualiza data.json [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,scripts,*.xlsx,*.ps1'
